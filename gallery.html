<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conceptualizer Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="asset/styles.css">
</head>
<body data-page="gallery">
  <div class="bg-layer" aria-hidden="true">
    <img src="asset/images/depot-logo.png" alt="" class="bg-logo" onerror="this.style.display='none'">
  </div>
  <div class="strips-container" aria-hidden="true">
    <div class="strip s1"></div>
    <div class="strip s2"></div>
    <div class="strip s3"></div>
    <div class="strip s4"></div>
    <div class="strip s5"></div>
  </div>

  <div class="page-view active" data-page="gallery">
    <nav class="navbar">
      <div class="brand">
        <img src="asset/images/depot-logo.png" alt="Depot Logo" class="nav-logo" onerror="this.style.display='none'">
        <div>
          <span class="brand-main">NIGERIAN ARMY DEPOT</span>
          <span class="brand-sub">Conceptualizer</span>
        </div>
      </div>
    </nav>

    <a class="close-btn" href="index.html" aria-label="Close gallery and return home" title="Close">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </a>

    <main class="detail-layout single-column">
      <section id="galleryPage" class="detail-shell gallery-page-shell"></section>
    </main>

    <div id="galleryModal" class="gallery-modal" aria-hidden="true">
      <button type="button" class="gallery-modal-close" aria-label="Close image viewer">×</button>
      <img id="galleryModalImage" alt="Full-size gallery image">
      <div id="galleryModalCaption" class="gallery-modal-caption"></div>
    </div>
  </div>

  <script src="asset/script.js"></script>
</body>
</html>
