<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conceptualizer — Nigerian Army Depot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="asset/styles.css">
</head>
<body data-page="home">

  <!-- Video background -->
  <div class="bg-layer" aria-hidden="true">
    <video class="bg-gif" autoplay muted loop playsinline>
      <source src="asset/images/nigerian_army_depot_background.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>
  </div>

  <!-- Five-strip colour transition (load entrance + future navigation) -->
  <div class="strips-container" aria-hidden="true">
    <div class="strip s1"></div>
    <div class="strip s2"></div>
    <div class="strip s3"></div>
    <div class="strip s4"></div>
    <div class="strip s5"></div>
  </div>

  <!-- ================================
       MAIN PAGE VIEW
       ================================ -->
  <div class="page-view active" data-page="home">

    <!-- Fixed top navbar -->
    <nav class="navbar">
      <div class="brand">
        <img src="asset/images/logo.png" alt="Depot Logo" class="nav-logo" onerror="this.style.display='none'">
        <div>
          <span class="brand-main">NIGERIAN ARMY DEPOT</span>
          <span class="brand-sub">Conceptualizer</span>
        </div>
      </div>
    </nav>

    <main class="page-body home-layout">
      <section class="hero-section glass-panel hero-panel">
        <div class="hero-badge">Conceptualizer</div>

        <div class="portrait-frame">
          <img id="portrait"
               src="asset/images/LATE COAS POTRAIT.jpeg"
               alt="Late Lt Gen TA Lagbaja"
               class="portrait-img">
          <div class="portrait-shine" aria-hidden="true"></div>
        </div>

        <div class="nameplate">
          <h1 id="name">General Lagbaja</h1>
          <p id="title-role">Chief of Army Staff</p>
          <p id="decorations" class="decorations-strip"></p>
        </div>
      </section>

      <section class="action-panel glass-panel">
        <div class="action-buttons">
          <a class="action-link" href="biography.html">
            <span class="action-title">Biography</span>
            <span class="action-desc">Read the full life story</span>
          </a>
          <a class="action-link" href="achievements.html">
            <span class="action-title">Achievements</span>
            <span class="action-desc">View service milestones and honors</span>
          </a>
          <a class="action-link" href="gallery.html">
            <span class="action-title">Gallery</span>
            <span class="action-desc">Open the image collection</span>
          </a>
        </div>
      </section>
    </main>
  </div><!-- /page-view -->

  <script src="asset/script.js"></script>
</body>
</html>
