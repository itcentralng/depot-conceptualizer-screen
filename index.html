<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conceptualizer — Nigerian Army Depot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="asset/styles.css">
</head>
<body data-page="home">

  <div class="bg-layer" aria-hidden="true">
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="asset/images/nigerian_army_depot_background.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>
  </div>

  <div class="page-view active" data-page="home">

    <nav class="navbar">
      <img src="asset/images/logo.png" alt="Depot Logo" class="nav-logo" onerror="this.style.display='none'">
      <div class="brand">
        <span class="brand-main">NIGERIAN ARMY DEPOT</span>
        <span class="brand-sub">Conceptualizer</span>
      </div>
      <button class="kiosk-close" onclick="window.close()" title="Close">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
    </nav>

    <main class="home-body">

      <section class="hero-panel">
        <div class="hero-badge">Conceptualizer</div>
        <div class="portrait-frame">
          <img class="portrait-img"
               src="asset/images/LATE COAS POTRAIT.jpeg"
               alt="Late Lt Gen Taoreed Abiodun Lagbaja">
          <div class="portrait-shine" aria-hidden="true"></div>
        </div>
        <div class="nameplate">
          <h1 id="name">Late Lt Gen T.A. Lagbaja</h1>
          <p class="title-role" id="title-role">23rd Chief of Army Staff, Nigerian Army</p>
        </div>
      </section>

      <section class="action-panel">
        <div class="action-buttons">
          <a class="action-link" href="biography.html">
            <span class="action-title">Biography</span>
            <span class="action-desc">Read the full life story</span>
          </a>
          <a class="action-link" href="gallery.html">
            <span class="action-title">Gallery</span>
            <span class="action-desc">Open the image collection</span>
          </a>
          <a class="action-link" href="achievements.html">
            <span class="action-title">Achievements</span>
            <span class="action-desc">Honours &amp; decorations</span>
          </a>
        </div>
      </section>

    </main>
  </div>

  <script src="asset/script.js"></script>
</body>
</html>
